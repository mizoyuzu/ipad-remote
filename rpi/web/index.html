<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPad Remote Demo</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #111;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    p  { font-size: 14px; color: #666; margin-bottom: 36px; }
    .cards {
      display: flex;
      gap: 20px;
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 160px;
      height: 160px;
      border: 1.5px solid #e0e0e0;
      border-radius: 16px;
      text-decoration: none;
      color: #111;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    a.card:hover {
      border-color: #000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .icon { font-size: 40px; }
    .label { font-size: 14px; font-weight: 500; }
    .sub   { font-size: 11px; color: #999; }
  </style>
</head>
<body>
  <h1>iPad Remote Demo</h1>
  <p>操作ページとモニターページを別ウィンドウで開けます</p>
  <div class="cards">
    <a class="card" href="/control.html" target="_blank">
      <div class="icon">🎮</div>
      <div class="label">操作</div>
      <div class="sub">Control</div>
    </a>
    <a class="card" href="/monitor.html" target="_blank">
      <div class="icon">📊</div>
      <div class="label">モニター</div>
      <div class="sub">Monitor</div>
    </a>
  </div>
</body>
</html>
